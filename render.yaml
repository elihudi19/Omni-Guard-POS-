services:
  - type: web
    name: omni-guard-api
    runtime: python
    buildCommand: "./build.sh"
    startCommand: "gunicorn backend.wsgi:application --bind 0.0.0.0:$PORT --workers 2 --timeout 120"
    envVars:
      - key: DJANGO_SETTINGS_MODULE
        value: backend.settings
      - key: DEBUG
        value: "False"
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: omni-guard-db
          property: connectionString
      - key: DJANGO_SUPERUSER_USERNAME
        value: admin
      - key: DJANGO_SUPERUSER_EMAIL
        value: admin@omniguard.app
      - key: DJANGO_SUPERUSER_PASSWORD
        sync: false   # Set this manually in the Render dashboard

databases:
  - name: omni-guard-db
    databaseName: omniguard
    user: omniguard
    plan: free
